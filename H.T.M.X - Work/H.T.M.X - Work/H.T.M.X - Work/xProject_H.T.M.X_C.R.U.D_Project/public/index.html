<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- htmx -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="card shadow-lg">
      <div class="card-body">
        <h1 class="mb-4 text-center">✅ Todo App</h1>

        <!-- Add Todo Form -->
        <form hx-post="/api/todos" hx-trigger="submit" hx-target="#todo-list" hx-swap="afterbegin" class="d-flex mb-4">
          <input type="text" name="task" class="form-control me-2" placeholder="Enter a new task" required>
          <button class="btn btn-primary">Add</button>
        </form>

        <!-- Todo List -->
        <ul id="todo-list" class="list-group" 
            hx-get="/api/todos" 
            hx-trigger="load" 
            hx-target="#todo-list" 
            hx-swap="innerHTML">
          <!-- htmx will load todos here -->
        </ul>
      </div>
    </div>
  </div>

  <!-- Template for rendering todos -->
  <template id="todo-template">
    <li class="list-group-item d-flex justify-content-between align-items-center">
      <span class="task-text"></span>
      <div>
        <button class="btn btn-sm btn-outline-secondary me-2 edit-btn">Edit</button>
        <button class="btn btn-sm btn-danger delete-btn">Delete</button>
      </div>
    </li>
  </template>

  <script>
    // Enhance rendering with htmx response swaps
    document.body.addEventListener("htmx:afterOnLoad", function(evt) {
      if (evt.detail.target.id === "todo-list" && Array.isArray(evt.detail.xhr.response)) {
        const todos = evt.detail.xhr.response;
        const list = document.getElementById("todo-list");
        list.innerHTML = "";

        const template = document.getElementById("todo-template");

        todos.forEach(todo => {
          const li = template.content.cloneNode(true);
          li.querySelector(".task-text").textContent = todo.task;

          // Edit handler
          li.querySelector(".edit-btn").addEventListener("click", () => {
            const newTask = prompt("Edit task:", todo.task);
            if (newTask && newTask.trim() !== "") {
              fetch(`/api/todos/${todo.id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ task: newTask })
              }).then(() => htmx.trigger("#todo-list", "load"));
            }
          });

          // Delete handler
          li.querySelector(".delete-btn").addEventListener("click", () => {
            fetch(`/api/todos/${todo.id}`, { method: "DELETE" })
              .then(() => htmx.trigger("#todo-list", "load"));
          });

          list.appendChild(li);
        });
      }
    });
  </script>
</body>
</html>
