<!-- main_app/templates/main_app/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotes</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.4"></script>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <!-- Card for Quotes -->
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-header bg-primary text-white text-center">
                    <h2 class="mb-0">Quotes Collection</h2>
                </div>
                <div class="card-body">

                    <!-- Quotes List -->
                    <ul id="quoteList" class="list-group mb-4">
                        {% for quote in quotes %}
                            {% include "main_app/quote_item.html" %}
                        {% empty %}
                            <li class="list-group-item text-center text-muted">
                                No quotes yet. Add one below!
                            </li>
                        {% endfor %}
                    </ul>

                    <!-- Form to add quotes -->
                    <form hx-post="{% url 'quote_create' %}" 
                          hx-target="#quoteList" 
                          hx-swap="beforeend" 
                          class="row g-2">
                        {% csrf_token %}
                        <div class="col-12 col-md-7">
                            <input type="text" name="text" class="form-control" placeholder="Enter quote text" required>
                        </div>
                        <div class="col-12 col-md-5">
                            <input type="text" name="author" class="form-control" placeholder="Enter author" required>
                        </div>
                        <div class="col-12 d-grid mt-3">
                            <button type="submit" class="btn btn-success">
                                ➕ Add Quote
                            </button>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
