<!-- main_app/templates/main_app/person_item.html -->
<li id="person-{{ person.id }}" class="list-group-item d-flex justify-content-between align-items-center">
  <div class="d-flex align-items-center">
    {% if person.profile_image %}
      <img src="{{ person.profile_image.url }}" alt="profile" class="rounded-circle me-3" width="50" height="50">
    {% else %}
      <div class="bg-secondary rounded-circle me-3 d-flex align-items-center justify-content-center" style="width:50px; height:50px;">
        <span class="text-white fw-bold">{{ person.name|first|upper }}</span>
      </div>
    {% endif %}
    <div>
      <strong>{{ person.name }}</strong><br>
      <small>{{ person.email }} | {{ person.phone }} | {{ person.major }}</small>
    </div>
  </div>
  <div>
    <button class="btn btn-sm btn-outline-primary"
            hx-get="{% url 'person_edit' person.id %}"
            hx-target="#person-{{ person.id }}"
            hx-swap="outerHTML">✏️ Edit</button>

    <button class="btn btn-sm btn-outline-danger"
            hx-delete="{% url 'person_delete' person.id %}"
            hx-target="#person-{{ person.id }}"
            hx-swap="outerHTML">🗑️ Delete</button>
  </div>
</li>
