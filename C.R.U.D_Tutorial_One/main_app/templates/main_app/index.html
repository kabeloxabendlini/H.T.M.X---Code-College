<!-- main_app/templates/main_app/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>People Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.4"></script>
</head>
<body class="bg-light">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card shadow-lg border-0 rounded-3">
        <div class="card-header bg-primary text-white text-center">
          <h2 class="mb-0">People Directory</h2>
        </div>
        <div class="card-body">

          <!-- People List -->
          <ul id="peopleList" class="list-group mb-4">
            {% for person in people %}
              {% include "main_app/person_item.html" %}
            {% empty %}
              <li class="list-group-item text-center text-muted">
                No people added yet. Add someone below!
              </li>
            {% endfor %}
          </ul>

          <!-- Add Person Form -->
          <form hx-post="{% url 'person_create' %}" 
                hx-target="#peopleList" 
                hx-swap="beforeend"
                enctype="multipart/form-data"
                class="row g-2">
            {% csrf_token %}
            <div class="col-md-6">
              <input type="text" name="name" class="form-control" placeholder="Full Name" required>
            </div>
            <div class="col-md-6">
              <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="col-md-6">
              <input type="text" name="phone" class="form-control" placeholder="Phone" required>
            </div>
            <div class="col-md-6">
              <input type="text" name="major" class="form-control" placeholder="Major">
            </div>
            <div class="col-12">
              <input type="file" name="profile_image" class="form-control" id="profileImageInput">
              <div class="mt-2 text-center">
                <img id="profileImagePreview" src="" class="img-thumbnail d-none" width="100">
              </div>
            </div>
            <div class="col-12 d-grid mt-3">
              <button type="submit" class="btn btn-success">➕ Add Person</button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById("profileImageInput").addEventListener("change", function (event) {
  const preview = document.getElementById("profileImagePreview");
  const file = event.target.files[0];
  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.classList.remove("d-none");
  } else {
    preview.src = "";
    preview.classList.add("d-none");
  }
});
</script>

<script>
  // Grab Django's CSRF token from cookie
  function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
          const cookies = document.cookie.split(';');
          for (let i = 0; i < cookies.length; i++) {
              const cookie = cookies[i].trim();
              if (cookie.substring(0, name.length + 1) === (name + '=')) {
                  cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                  break;
              }
          }
      }
      return cookieValue;
  }
  const csrftoken = getCookie('csrftoken');

  // Add CSRF header to all HTMX requests
  document.body.addEventListener('htmx:configRequest', (event) => {
      event.detail.headers['X-CSRFToken'] = csrftoken;
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
